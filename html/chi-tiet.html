<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Chi tiết sản phẩm – CampZone</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
     <script src="../js/scriptchitiet.js" defer></script>
      <link rel="stylesheet" href="../css/stylechitiet.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <img src="../assets/logo2.png" alt="Logo">
        <a class="navlink" href="../index.html">Trang chủ</a>
        <a class="navlink" href="gioi-thieu.html">Giới Thiệu</a>
        <a class="navlink" href="san-phamleu.html">Lều</a>
        <a class="navlink" href="san-phamthietbi.html">Trang thiết bị</a>
        <a class="navlink" href="lien-he.html">Liên hệ</a>
        <a class="navlink navlink-auth" href="#" id="btn-login">
            <i class="fa-regular fa-user"></i> Đăng nhập
        </a>
        <a class="navlink navlink-auth" href="#" id="btn-register">
            <i class="fa-regular fa-user"></i> Đăng ký
        </a>
    </nav>

    <!-- BACK BUTTON -->
    <a class="back-btn" href="../index.html">
        <i class="fa-solid fa-arrow-left"></i> Trang chủ
    </a>

    <!-- PRODUCT DETAIL -->
    <div class="product-detail" id="product-detail">

        <!-- LEFT: IMAGES -->
        <div class="product-images">
            <div class="main-image">
                <img id="main-img" src="" alt="">
            </div>
            <div class="thumbnails" id="thumbnails">
                <!-- thumbnails sẽ được tạo bằng JS -->
            </div>
        </div>

        <!-- RIGHT: INFO -->
        <div class="product-info">
            <h1 class="product-name" id="detail-name"></h1>

            <div class="product-rating">
                <span class="stars">★★★★★</span>
                <span class="rating-count">(128 đánh giá)</span>
            </div>

            <div class="product-price">
                <span class="price-main" id="detail-price"></span>
            </div>

            <div class="divider"></div>

            <p class="product-desc" id="detail-desc"></p>

            <div>
                <p class="option-label">Số lượng</p>
                <div class="qty-row">
                    <button class="qty-btn" onclick="changeQty(-1)">−</button>
                    <input class="qty-val" id="qty" type="number" value="1" min="1" max="99" readonly>
                    <button class="qty-btn" onclick="changeQty(1)">+</button>
                </div>
            </div>

            <div class="btn-row">
                <button class="btn-buy">
                    <i class="fa-solid fa-bag-shopping"></i> &nbsp;Thêm vào giỏ
                </button>
                <button class="btn-wish" id="wishBtn" onclick="toggleWish(this)" title="Yêu thích">
                    <i class="fa-regular fa-heart"></i>
                </button>
            </div>

            <div class="divider"></div>
        </div>
    </div>

    <!-- MODAL OVERLAY -->
    <div id="modal-overlay"></div>

    <!-- MODAL ĐĂNG NHẬP -->
    <div id="modal-login" class="modal-box">
        <button class="modal-close" id="close-login"><i class="fa-solid fa-xmark"></i></button>
        <div class="modal-logo"><img src="../assets/logo2.png" alt="Logo"></div>
        <h2 class="modal-title">Đăng nhập</h2>
        <div class="modal-field"><label>EMAIL</label><input type="email" placeholder="email@example.com"></div>
        <div class="modal-field"><label>MẬT KHẨU</label><input type="password" placeholder="••••••••"></div>
        <button class="modal-submit">Đăng nhập</button>
        <p class="modal-switch">Chưa có tài khoản? <a href="#" id="goto-register">Đăng ký ngay</a></p>
    </div>

    <!-- MODAL ĐĂNG KÝ -->
    <div id="modal-register" class="modal-box">
        <button class="modal-close" id="close-register"><i class="fa-solid fa-xmark"></i></button>
        <div class="modal-logo"><img src="../assets/logo2.png" alt="Logo"></div>
        <h2 class="modal-title">Đăng ký</h2>
        <div class="modal-field"><label>HỌ TÊN</label><input type="text" placeholder="Nguyễn Văn A"></div>
        <div class="modal-field"><label>EMAIL</label><input type="email" placeholder="email@example.com"></div>
        <div class="modal-field"><label>MẬT KHẨU</label><input type="password" placeholder="••••••••"></div>
        <button class="modal-submit">Tạo tài khoản</button>
        <p class="modal-switch">Đã có tài khoản? <a href="#" id="goto-login">Đăng nhập</a></p>
    </div>
</body>
</html>
